<!DOCTYPE html>
<html>
<head>
<title>Storage DApp</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#667eea,#764ba2);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    text-align:center;
    width:320px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button{
    margin-top:10px;
    padding:10px;
    background:#f6851b;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e2761b;
}

input{
    margin-top:10px;
    padding:8px;
    width:80%;
}
</style>

</head>

<body>

<div class="container">

<h2>Storage DApp</h2>

<p id="status">Not Connected</p>

<button onclick="connectWallet()">Connect Wallet</button>

<hr>

<input type="number" id="valueInput" placeholder="Enter value">

<button onclick="setValue()">Set Value</button>

<button onclick="getValue()">Get Value</button>

<p id="output"></p>

</div>

<!-- ethers.js -->
<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.min.js"></script>

<script>

// GLOBAL VARIABLES
let provider;
let signer;
let contract;

// ✅ YOUR CONTRACT ADDRESS (Assignment 2)
const contractAddress = "0x6be65D73119188fEacF7ad1bc159CEf40d186357";

// ABI
const abi = [
    "function set(uint256 _data)",
    "function get() view returns (uint256)"
];


// ✅ CONNECT WALLET
async function connectWallet(){

    console.log("clicked");

    if(!window.ethereum){
        alert("MetaMask not installed");
        return;
    }

    try{
        const accounts = await window.ethereum.request({
            method: "eth_requestAccounts"
        });

        console.log(accounts);

        document.getElementById("status").innerText =
            "Connected: " + accounts[0];

    }
    catch(err){
        console.error(err);
        alert("You probably clicked cancel");
    }
}
// ✅ SET VALUE (TRIGGERS METAMASK)
async function setValue(){

    if(!contract){
        alert("Connect wallet first");
        return;
    }

    const val = document.getElementById("valueInput").value;

    if(!val){
        alert("Enter value");
        return;
    }

    try{

        const tx = await contract.set(val);

        alert("Check MetaMask for confirmation");

        await tx.wait();

        alert("Transaction Successful");

    }
    catch(err){
        console.error(err);
    }
}


// ✅ GET VALUE (NO METAMASK POPUP)
async function getValue(){

    if(!contract){
        alert("Connect wallet first");
        return;
    }

    try{

        const data = await contract.get();

        document.getElementById("output").innerText =
            "Stored Value: " + data.toString();

    }
    catch(err){
        console.error(err);
    }
}

</script>

</body>
</html>
